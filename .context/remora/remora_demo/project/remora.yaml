discovery_paths:
  - src/
  - tests/

bundle_root: agents
bundle_mapping:
  function: python_function
  method: python_function
  class: python_class
  file: python_file

model_base_url: ${REMORA_LLM_URL:-http://remora-server:8000/v1}
model_default: ${REMORA_MODEL:-Qwen/Qwen3-4B-Instruct-2507-FP8}

swarm_root: .remora
max_concurrency: 2
max_turns: 5
max_trigger_depth: 6
trigger_cooldown_ms: 500
